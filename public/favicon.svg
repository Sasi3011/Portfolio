<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f0ff"/>
      <stop offset="100%" stop-color="#f4f8ff"/>
    </linearGradient>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#3b82f6" flood-opacity="0.2"/>
    </filter>
    <filter id="dotShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#f43f5e" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGrad)"/>

  <!-- Border -->
  <rect width="64" height="64" rx="14" ry="14"
        fill="none"
        stroke="rgba(59,130,246,0.2)"
        stroke-width="1.5"/>

  <!-- Inner highlight -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="13" ry="13"
        fill="none"
        stroke="rgba(255,255,255,0.65)"
        stroke-width="1"/>

  <!-- Amber double rings — shifted left to make room for dot -->
  <g opacity="0.95">
    <circle cx="22" cy="13" r="4.8" fill="none" stroke="#f59e0b" stroke-width="2.2"/>
    <circle cx="33" cy="13" r="4.8" fill="none" stroke="#f59e0b" stroke-width="2.2"/>
  </g>

  <!-- "S" — bold, gradient -->
  <text
    x="22"
    y="54"
    font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
    font-weight="800"
    font-size="42"
    text-anchor="middle"
    fill="url(#sGrad)"
    filter="url(#shadow)"
  >S</text>

  <!-- Rose "." dot -->
  <text
    x="43"
    y="54"
    font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
    font-weight="900"
    font-size="46"
    text-anchor="middle"
    fill="#f43f5e"
    filter="url(#dotShadow)"
  >.</text>

</svg>